kind = "mobile"
previewPath = "/"
title = "Dukaan - Digital Register"
version = "1.0.0"
id = "artifacts/dukaan"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20095

[services.development]
run = "pnpm --filter @workspace/dukaan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dukaan", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/dukaan", "run", "serve" ]

[services.env]
PORT = "20095"
BASE_PATH = "/"
